<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語学習ページ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sidebar">
        <h2>日本語学習メニュー</h2>
        <div class="nav-menu">
            <button class="nav-btn" data-section="n2-vocab" onclick="loadSection('n2-vocab')">N2語彙</button>
            <button class="nav-btn" data-section="n2-vocab-quiz" onclick="loadSection('n2-vocab-quiz')">N2語彙クイズ</button>
            <button class="nav-btn" data-section="kanji-random" onclick="loadSection('kanji-random')">ランダム漢字語彙</button>
            <button class="nav-btn" data-section="n2-grammar" onclick="loadSection('n2-grammar')">N2文法</button>
            <button class="nav-btn" data-section="n1-vocab" onclick="loadSection('n1-vocab')">N1語彙</button>
            <button class="nav-btn" data-section="n1-grammar" onclick="loadSection('n1-grammar')">N1文法</button>
            <button class="nav-btn" data-section="reading" onclick="loadSection('reading')">読解</button>
            <button class="nav-btn" data-section="listening" onclick="loadSection('listening')">聴解</button>
        </div>
    </div>

    <div class="content">
        <h1>日本語学習ページ</h1>

        <div class="info-box">
            <div class="status-text" id="statusText">
                今日から 2026年7月5日（JLPT N1）までの残り日数を計算中...
            </div>
        </div>

        <div id="mainArea">
            <div id="loadingState" class="loading" style="display:none;">読み込み中...</div>
            <div id="errorState" class="error" style="display:none;"></div>
            <div id="listContainer" class="list-container" style="display:none;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
